  <text x="24" y="286" fill="#c9d1d9">POST /pets → requestBody → application/json → example</text>
  <text x="24" y="306" fill="#c9d1d9">  <tspan fill="#f85149">error E106</tspan>: missing required property "status"</text>
  <text x="24" y="326" fill="#3fb950">      fix: add "status": "available"</text>
  <text x="24" y="346" fill="#c9d1d9">  <tspan fill="#d29922">warning W203</tspan> at /adoptedAt: "yesterday" is not a valid date-time</text>
  <text x="24" y="366" fill="#3fb950">      fix: a valid date-time looks like "2026-07-12T09:30:00Z"</text>

