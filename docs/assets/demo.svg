  <text x="450" y="21" fill="#8b949e" text-anchor="middle">examplint — every example, checked against its schema</text>

  <text x="24" y="64" fill="#7ee787">$ examplint check openapi.yaml</text>
  <text x="24" y="86" fill="#c9d1d9">openapi.yaml: 5 examples checked, 0 skipped</text>

  <text x="24" y="116" fill="#c9d1d9">GET /pets → 200 → application/json → examples.two-pets</text>
  <text x="24" y="136" fill="#8b949e">  at /paths/~1pets/get/responses/200/content/application~1json/examples/two-pets/value</text>
  <text x="24" y="156" fill="#c9d1d9">  <tspan fill="#f85149">error E102</tspan> at /0/status: "avialable" is not one of the 3 allowed values</text>
  <text x="24" y="176" fill="#3fb950">      fix: did you mean "available"?</text>
  <text x="24" y="196" fill="#c9d1d9">  <tspan fill="#f85149">error E101</tspan> at /1/id: expected integer, got string "2"</text>
  <text x="24" y="216" fill="#3fb950">      fix: unquote it: 2</text>
  <text x="24" y="236" fill="#c9d1d9">  <tspan fill="#f85149">error E107</tspan> at /1/taggs: property "taggs" is not declared in the schema and additionalProperties is false</text>
